<!DOCTYPE html>
<html lang="zh">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Memory card game</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
<div class="game-wrapper">
    <h1>Memory card game</h1>

    <div class="stats">
        <span>⭐ matched: <span id="matchesCount">0</span>/8</span>
        <span>🔰 moves: <span id="movesCount">0</span></span>
    </div>

    <div class="board" id="gameBoard"></div>

    <div class="history-panel">
        <div class="history-list" id="historyList">
            
        </div>
    </div>

    <div class="message" id="messageArea"></div>

    <div class="controls">
        <button id="resetBtn">🔄 Reset</button>
    </div>
</div>

<script src="jyfp1.js">
   
</script>
<script>
  function autoScale() {
    // 1. 把 800 改成你游戏设计的实际宽度（比如所有卡牌加起来的总宽度）
    const gameWidth = 800; 
    
    // 获取当前手机屏幕的宽度
    const clientWidth = document.documentElement.clientWidth || window.innerWidth;
    
    // 如果屏幕比游戏窄，就计算缩放比例
    if (clientWidth < gameWidth) {
      const scale = clientWidth / gameWidth;
      // 假设你的最外层游戏盒子的 class 叫 game-container，给它整体缩放
      const container = document.querySelector('.game-container') || document.body;
      
      container.style.transform = `scale(${scale})`;
      container.style.transformOrigin = 'top center'; // 以顶部中心为对齐点缩放
    }
  }
  // 运行缩放
  window.addEventListener('resize', autoScale);
  autoScale();
</script>
</body>
</html>
